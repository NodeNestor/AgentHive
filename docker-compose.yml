# AgentHive — run with: docker compose up -d
#
# The router spawns sibling agentcore:* containers as sessions, so
# we mount the host Docker socket. Sessions join `agenthive-net`
# (create once: docker network create agenthive-net).

name: agenthive

networks:
  agenthive-net:
    external: true

services:
  router:
    build: .
    image: agenthive:latest
    container_name: agenthive-router
    restart: unless-stopped
    ports:
      - "7700:7700"
    networks:
      - agenthive-net
    environment:
      NODE_ENV: production
    env_file:
      - .env
    volumes:
      # Docker socket — router orchestrates sibling session containers.
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent router state (SQLite + session dirs).
      - ./data:/app/data
      - ./state:/app/state
      # Example workflows + shared hook library.
      - ./examples:/app/examples:ro
      - ./hooks-lib:/app/hooks-lib:ro
    healthcheck:
      # Use node (already present) rather than wget (which isn't in
      # the slim base image). Small fetch that exits 0 on 2xx.
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:7700/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
