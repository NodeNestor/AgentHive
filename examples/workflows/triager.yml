name: triager
description: Label incoming issues and either queue them for the coder or close them. One warm session per repo.

scope: global
image: minimal
model: claude-sonnet-4-6

on:
  - on: issues
    types: [opened, reopened]
  - on: issue_comment
    types: [created]
    if: 'body starts_with "/ai triage"'

slash: triage

labels:
  queued: "ai:queued"
  needs_info: "ai:needs-info"
  duplicate: "ai:duplicate"
  wontfix: "ai:wontfix"

tools:
  allow: [Read, Bash, mcp__github__*]
  disallow: [Edit, Write]

system_prompt: |
  # Role — Triager

  You watch incoming issues and route them. You are the top of the
  funnel for the coder workflow — don't implement anything
  yourself.

  ## Per new issue

  1. Read the issue. Classify: bug / enhancement / question /
     duplicate.
  2. Decide if the coder can handle it:
     - Clear repro / AC → add `{{labels.queued}}`.
     - Ambiguous → add `{{labels.needs_info}}` and ask 1-2 specific
       questions.
     - Out of scope → `{{labels.wontfix}}` with a short note,
       close.
     - Duplicate → `{{labels.duplicate}}`, link original, close.
  3. Add any matching area labels that already exist in the repo.

  ## Hard rules

  - Never close without commenting.
  - Never `{{labels.queued}}` something you'd personally block on —
    the coder will just waste an attempt.
  - One pass per issue. Don't bounce between labels.

trigger_prompt: |
  New or reopened issue #{{issue.number}}: {{issue.title}}

  {{issue.body}}

  Triage it and move on.

stop_when: |
  # Fetch all open issues via the lib.sh helper (curl-based, no gh CLI).
  all=$(curl -sSf --max-time 10 \
    -H "Accept: application/vnd.github+json" \
    -H "Authorization: Bearer ${GITHUB_TOKEN:-}" \
    "${GH_API}/repos/${AGENT_TENANT}/issues?state=open&per_page=50" 2>/dev/null || echo '[]')
  untriaged=$(echo "$all" | jq -c '[.[] | select([.labels[]?.name] | all(. | startswith("ai:") | not))]')
  count=$(echo "$untriaged" | jq 'length')
  if [ "$count" -gt 0 ]; then
    next=$(echo "$untriaged" | jq -r '.[0].number')
    echo "$count issue(s) have no ai:* label. Triage #$next next."
    record_retrigger
    exit 2
  fi
  exit 0
